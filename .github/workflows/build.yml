name: Flutter Build CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with: { distribution: 'zulu', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.19.0', channel: 'stable' }
      
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Generate Web Files (Fix missing index.html)
        run: flutter create --platforms=web .
        
      - name: Build Web
        run: flutter build web
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: { name: release-apk, path: build/app/outputs/flutter-apk/app-release.apk }
        
      - name: Upload Web
        uses: actions/upload-artifact@v4
        with: { name: web-build, path: build/web }
